name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # PrestaShop source tag used to load real core classes for PHPStan.
  # Bump when raising the supported PS floor.
  PS_VERSION: '9.0.0'

jobs:
  static-analysis:
    name: Static analysis (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        # Pinned to a current tag because GitHub Actions cached a stale
        # SHA for `@v2` whose tarball codeload no longer serves (CI was
        # erroring with "An action could not be found at the URI ...").
        uses: shivammathur/setup-php@2.37.1
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json, openssl, intl
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: PHP_CodeSniffer (PSR-12)
        # No args -> phpcs picks up `phpcs.xml.dist`, which scans `src`
        # and `tests` while honouring the `tests/Stubs/*` exclude.
        run: vendor/bin/phpcs

      - name: Cache PrestaShop source
        id: ps-cache
        uses: actions/cache@v4
        with:
          path: .ps-src
          # v2: includes PS core composer deps (vendor/) alongside the source tree
          key: ps-src-${{ env.PS_VERSION }}-v2

      - name: Clone PrestaShop source (for PHPStan core resolution)
        if: steps.ps-cache.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch ${{ env.PS_VERSION }} https://github.com/PrestaShop/PrestaShop.git .ps-src

      # `prestashop/php-dev-tools` PHPStan bootstrap loads `<PS_ROOT>/config/autoload.php`,
      # which `require`s `<PS_ROOT>/vendor/autoload.php`. Install PS core deps once
      # (cached alongside .ps-src). --no-scripts/--no-plugins avoids post-install
      # hooks that touch the storefront DB; --ignore-platform-reqs lets PS 9 (which
      # may pin a different PHP minor than our matrix) install regardless.
      - name: Install PrestaShop core composer deps (PHPStan needs the autoloader)
        if: steps.ps-cache.outputs.cache-hit != 'true'
        working-directory: .ps-src
        run: composer install --no-dev --no-scripts --no-plugins --prefer-dist --no-progress --no-interaction --ignore-platform-reqs

      - name: PHPStan (level 5, with PS core loaded)
        env:
          _PS_ROOT_DIR_: ${{ github.workspace }}/.ps-src
        run: vendor/bin/phpstan analyse --configuration=tests/phpstan/phpstan.neon --no-progress

      - name: PHPUnit (unit + contract)
        # Integration suite lives in `phpunit.integration.xml.dist` and
        # is excluded here — it requires the parent docker compose stack
        # (qameraai-prestashop/) and runs in the separate `integration`
        # job below on a single PHP version.
        run: vendor/bin/phpunit --testsuite=unit,contract

  integration:
    name: Integration (PS9 kernel)
    runs-on: ubuntu-latest
    # Fork PRs run on a runner with a read-only GITHUB_TOKEN and no
    # secret access — but the integration job has no secret needs.
    # We still match the design Q3 decision (in-repo only) by gating
    # on head.repo == base.repo so external forks don't burn runner
    # minutes while we settle the new harness.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3 (host-side, for composer install only)
        uses: shivammathur/setup-php@2.37.1
        with:
          php-version: '8.3'
          extensions: mbstring, json, openssl, intl
          coverage: none
          tools: composer:v2

      - name: Composer install (module vendor — required before docker compose up)
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Stage module into compose volume path
        # The compose file expects `./module` (relative to the compose
        # file under .ci/) to contain the module source. We stage the
        # checked-out tree there so the bind-mount resolves cleanly
        # without touching the workspace-root contents the runner
        # already has.
        run: |
          mkdir -p .ci/module
          # Copy everything except .ci/ itself (avoid recursion) and the
          # transient .git directory (not needed inside the PS container).
          rsync -a --exclude='.ci' --exclude='.git' ./ .ci/module/

      - name: Boot PrestaShop + MySQL via compose
        working-directory: .ci
        run: docker compose -f docker-compose.integration.yml up -d

      - name: Wait for PrestaShop to become reachable
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || true)
            if [ "$code" = "200" ] || [ "$code" = "302" ] || [ "$code" = "500" ]; then
              echo "PrestaShop responded with HTTP $code after ${i}0s"
              exit 0
            fi
            sleep 10
          done
          echo "PrestaShop did not become reachable within 10 minutes"
          docker compose -f .ci/docker-compose.integration.yml logs --tail=200 prestashop || true
          exit 1

      - name: Install qameraai module via prestashop:module console
        working-directory: .ci
        # PS_INSTALL_AUTO bootstraps the storefront DB but does NOT
        # install third-party modules sitting in modules/. Running the
        # console install creates ps_qamera_product_link, registers the
        # actionProductSave / actionWatermark hooks, and seeds
        # configuration defaults — everything BookkeepingFactory and
        # the sync flow rely on. The command is idempotent: re-running
        # against an already-installed module exits 0 with a notice.
        run: |
          docker compose -f docker-compose.integration.yml exec -T prestashop \
            php /var/www/html/bin/console prestashop:module install qameraai

      - name: Run integration suite inside the PS container
        working-directory: .ci
        run: |
          docker compose -f docker-compose.integration.yml exec -T prestashop bash -c \
            'cd /var/www/html/modules/qameraai && vendor/bin/phpunit -c phpunit.integration.xml.dist'

      - name: Dump PS logs on failure
        if: failure()
        working-directory: .ci
        run: |
          docker compose -f docker-compose.integration.yml logs --tail=300 prestashop || true
          docker compose -f docker-compose.integration.yml exec -T mysql \
            mysql -uroot -pprestashop prestashop \
            -e "SELECT id_log, severity, error_code, message, date_add FROM ps_log ORDER BY id_log DESC LIMIT 20" || true
