services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: true

  QameraAi\Module\Controller\Admin\:
    resource: '../../src/Controller/Admin'
    tags: ['controller.service_arguments']

  # Renders the product-detail Qamera tab. Needs twig/router/csrf which are
