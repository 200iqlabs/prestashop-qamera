services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  QameraAi\Module\:
    resource: '../src/*'
    exclude:
      - '../src/Install/*'
      # Phase 4.2 event-dispatch classes carry non-autowirable constructor
      # args (string $tablePrefix, array $handlers) and are wired manually
      # inside controllers/front/webhook.php::buildDispatcher(). Letting
      # Symfony scan them produces "Cannot autowire service" failures at
      # container-compilation time, which kills module install.
      - '../src/Webhook/Event/*'
      # Phase 4.3: CachedReferenceClient takes a runtime $apiKey, and
      # CostCalculator takes a CachedReferenceClient — neither can be
      # autowired. The factory (CachedReferenceClientFactory) + bridge
      # (CalculatorBridge) wrap them with autowire-friendly indirection;
      # consumers depend on those instead.
      - '../src/Api/Cache/CachedReferenceClient.php'
      - '../src/Packshot/CostCalculator.php'

  QameraAi\Module\Api\QameraApiClient:
    factory: ['@QameraAi\Module\Api\Factory\QameraApiClientFactory', 'create']
    public: true

  qameraai.db:
    class: Db
    factory: ['Db', 'getInstance']
    public: false

  QameraAi\Module\Sync\ProductRefBuilder:
    public: true

  QameraAi\Module\Sync\PrestaShopLoggerWrapper:
    public: true

  QameraAi\Module\Sync\ProductSnapshotWriter:
    public: true
    arguments:
      $db: '@qameraai.db'
      # Resolves to the runtime `_DB_PREFIX_` constant defined by PS at
      # boot (`config/defines.inc.php`). Symfony's `!php/const` directive
      # reads the constant during container compilation, so shops with a
      # custom DB prefix get the correct table name — `ps_` is only the
      # default, not a guarantee. The `Installer::createSchema` migration
      # already uses `_DB_PREFIX_`; this keeps the writer consistent.
      $tablePrefix: !php/const _DB_PREFIX_
      $refBuilder: '@QameraAi\Module\Sync\ProductRefBuilder'
      $logger: '@QameraAi\Module\Sync\PrestaShopLoggerWrapper'

  QameraAi\Module\Sync\PrimaryImageResolver:
    public: true

  QameraAi\Module\Sync\InMemoryDedupCache:
    public: true

  # Vanilla Guzzle client used by `PresignedImageUploadStrategy` to PUT
  # image bytes to the presigned upload URL. Separate instance from the
  # one inside `QameraApiClient` so timeouts / headers can differ for
  # the raw upload (no auth, longer timeout, plain octet-stream body).
  qameraai.upload_http_client:
    class: GuzzleHttp\Client
    arguments:
      - { connect_timeout: 5.0, timeout: 60.0, http_errors: true }
    public: false

  QameraAi\Module\Sync\PresignedImageUploadStrategy:
    public: true
    arguments:
      $apiClient: '@QameraAi\Module\Api\QameraApiClient'
      $httpClient: '@qameraai.upload_http_client'

  QameraAi\Module\Sync\ImageUploadStrategy:
    alias: QameraAi\Module\Sync\PresignedImageUploadStrategy
    public: true

  QameraAi\Module\Sync\ProductImageSyncService:
    public: true
    arguments:
      $db: '@qameraai.db'
      $tablePrefix: !php/const _DB_PREFIX_
      $refBuilder: '@QameraAi\Module\Sync\ProductRefBuilder'
      $apiClient: '@QameraAi\Module\Api\QameraApiClient'
      $uploadStrategy: '@QameraAi\Module\Sync\PresignedImageUploadStrategy'
      $resolver: '@QameraAi\Module\Sync\PrimaryImageResolver'
      $logger: '@QameraAi\Module\Sync\PrestaShopLoggerWrapper'
      $dedupCache: '@QameraAi\Module\Sync\InMemoryDedupCache'
      $importedOutputs: '@QameraAi\Module\Packshot\Output\ImportedOutputRepository'

  # Phase 4.5 (add-packshot-output-downloader) — imported-output ledger.
  # Same raw-SQL repository shape as PackshotReviewRepository; Db + prefix
  # scalars wired explicitly (Symfony cannot autowire them).
  QameraAi\Module\Packshot\Output\ImportedOutputRepository:
    public: true
    arguments:
      $db: '@qameraai.db'
      $tablePrefix: !php/const _DB_PREFIX_

  # Phase 4.5 — output import service + presenter, public so the BO import
  # controller can pull them as action arguments. All other deps autowire.
  QameraAi\Module\Packshot\Output\OutputImporter:
    public: true
  QameraAi\Module\Packshot\Output\ImportResultPresenter:
    public: true

  # ---- Phase 4.1: webhook handler ----
  # The front controller (`controllers/front/webhook.php`) instantiates
  # the handler graph directly to keep storefront-request bootstrap cheap
  # and the legacy-dispatcher path framework-free. These service defs
  # exist so BO/admin code (Phase 4.2) can pull the same wiring via DI.

  QameraAi\Module\Webhook\SignatureHeaderParser:
    public: true

  QameraAi\Module\Webhook\HmacVerifier:
    public: true

  QameraAi\Module\Webhook\SystemClock:
    public: true

  QameraAi\Module\Webhook\Clock:
    alias: QameraAi\Module\Webhook\SystemClock
    public: true

  QameraAi\Module\Webhook\ReplayGuard:
    public: true
    arguments:
      $clock: '@QameraAi\Module\Webhook\SystemClock'

  QameraAi\Module\Webhook\WebhookDeliveryRepository:
    public: true
    arguments:
      $db: '@qameraai.db'
      $tablePrefix: !php/const _DB_PREFIX_

  QameraAi\Module\Webhook\Log\PrestaShopLoggerAdapter:
    public: true
    arguments:
      $logger: '@QameraAi\Module\Sync\PrestaShopLoggerWrapper'

  QameraAi\Module\Webhook\WebhookLogger:
    alias: QameraAi\Module\Webhook\Log\PrestaShopLoggerAdapter
    public: true

  QameraAi\Module\Webhook\WebhookRequestHandler:
    public: true
    arguments:
      $parser: '@QameraAi\Module\Webhook\SignatureHeaderParser'
      $verifier: '@QameraAi\Module\Webhook\HmacVerifier'
      $replayGuard: '@QameraAi\Module\Webhook\ReplayGuard'
      $repository: '@QameraAi\Module\Webhook\WebhookDeliveryRepository'
      $clock: '@QameraAi\Module\Webhook\SystemClock'
      $logger: '@QameraAi\Module\Webhook\Log\PrestaShopLoggerAdapter'

  # ---- Phase 4.3: packshot-jobs + reference cache ----
  # Every class below carries a string-typed constructor arg (table prefix,
  # cache dir, or API key) that Symfony's autowire cannot resolve on its
  # own. Explicit wiring is required even though they sit inside the
  # auto-discovered ../src/* glob — without these blocks the container
  # compilation fails the moment any consumer asks for one.

  QameraAi\Module\Packshot\PackshotJobRepository:
    public: true
    arguments:
      $db: '@qameraai.db'
      $tablePrefix: !php/const _DB_PREFIX_

  # Phase 4.4 (add-packshot-acceptance-flow) — local voting store. Same
  # raw-SQL repository shape as PackshotJobRepository; Symfony cannot
  # autowire the Db + prefix scalars, so they are wired explicitly.
  QameraAi\Module\Packshot\Acceptance\PackshotReviewRepository:
    public: true
    arguments:
      $db: '@qameraai.db'
      $tablePrefix: !php/const _DB_PREFIX_

  # Phase 4.4 — accept/reject vote service. API call first, local voting
  # flip only on 2xx. Deps are all services; wired explicitly so the BO
  # vote controller can fetch it from the container by id.
  QameraAi\Module\Packshot\Acceptance\PackshotVoteService:
    public: true
    arguments:
      $apiClient: '@QameraAi\Module\Api\QameraApiClient'
      $repository: '@QameraAi\Module\Packshot\Acceptance\PackshotReviewRepository'
      $logger: '@QameraAi\Module\Sync\PrestaShopLoggerWrapper'

  QameraAi\Module\Packshot\SyncedProductLinkLookup:
    public: true
    arguments:
      $db: '@qameraai.db'
      $tablePrefix: !php/const _DB_PREFIX_

  QameraAi\Module\Packshot\PackshotJobUpdater:
    public: true
    arguments:
      $repository: '@QameraAi\Module\Packshot\PackshotJobRepository'
      $linkLookup: '@QameraAi\Module\Packshot\SyncedProductLinkLookup'
      $logger: '@QameraAi\Module\Webhook\WebhookLogger'

  # Phase 4.4 (add-analysis-status-surfacing) — Refresher takes the
  # PS table prefix as a constructor string so Symfony cannot autowire
  # it. Wires through @qameraai.db + autowired API client + logger.
  QameraAi\Module\Sync\AnalysisStatusRefresher:
    public: true
    arguments:
      $db: '@qameraai.db'
      $tablePrefix: !php/const _DB_PREFIX_
      $client: '@QameraAi\Module\Api\QameraApiClient'
      $logger: '@QameraAi\Module\Sync\PrestaShopLoggerWrapper'

  QameraAi\Module\Packshot\PackshotJobSubmitter:
    public: true
    arguments:
      $apiClient: '@QameraAi\Module\Api\QameraApiClient'
      $repository: '@QameraAi\Module\Packshot\PackshotJobRepository'
      $linkLookup: '@QameraAi\Module\Packshot\SyncedProductLinkLookup'
      $reviewRepository: '@QameraAi\Module\Packshot\Acceptance\PackshotReviewRepository'
      $logger: '@QameraAi\Module\Sync\PrestaShopLoggerWrapper'

  # add-jobs-history-refresh — pull-based job reconciliation. All deps are
  # services (no scalars), but kept public + explicit for controller
  # action-argument resolution, mirroring AnalysisStatusRefresher.
  QameraAi\Module\Packshot\JobsStatusRefresher:
    public: true
    arguments:
      $repository: '@QameraAi\Module\Packshot\PackshotJobRepository'
      $client: '@QameraAi\Module\Api\QameraApiClient'
      $logger: '@QameraAi\Module\Sync\PrestaShopLoggerWrapper'

  # ReferenceCache needs an explicit cache directory; the rest of the
  # Phase-4.3 reference-cache graph is autowire-friendly via the factory.
  QameraAi\Module\Api\Cache\ReferenceCache:
    public: true
    arguments:
      # !php/const works for constants known at container-compile time.
      # _PS_CACHE_DIR_ is defined by PS bootstrap before the container
      # is built (config/defines.inc.php) — safe to reference here.
      $cacheDir: !php/const _PS_CACHE_DIR_

  QameraAi\Module\Api\Cache\CachedReferenceClientFactory:
    public: true
    arguments:
      $client: '@QameraAi\Module\Api\QameraApiClient'
      $cache: '@QameraAi\Module\Api\Cache\ReferenceCache'

  QameraAi\Module\Packshot\CalculatorBridge:
    public: true
    arguments:
      $factory: '@QameraAi\Module\Api\Cache\CachedReferenceClientFactory'
