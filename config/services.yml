services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  QameraAi\Module\:
    resource: '../src/*'
    exclude:
      - '../src/Install/*'

  QameraAi\Module\Api\QameraApiClient:
    factory: ['@QameraAi\Module\Api\Factory\QameraApiClientFactory', 'create']
    public: true
