services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  QameraAi\Module\:
    resource: '../src/*'
    exclude:
      - '../src/Install/*'
      # Phase 4.2 event-dispatch classes carry non-autowirable constructor
      # args (string $tablePrefix, array $handlers) and are wired manually
      # inside controllers/front/webhook.php::buildDispatcher(). Letting
      # Symfony scan them produces "Cannot autowire service" failures at
      # container-compilation time, which kills module install.
      - '../src/Webhook/Event/*'

  QameraAi\Module\Api\QameraApiClient:
    factory: ['@QameraAi\Module\Api\Factory\QameraApiClientFactory', 'create']
    public: true

  qameraai.db:
    class: Db
    factory: ['Db', 'getInstance']
    public: false

  QameraAi\Module\Sync\ProductRefBuilder:
    public: true

  QameraAi\Module\Sync\PrestaShopLoggerWrapper:
    public: true

  QameraAi\Module\Sync\ProductSnapshotWriter:
    public: true
    arguments:
      $db: '@qameraai.db'
      # Resolves to the runtime `_DB_PREFIX_` constant defined by PS at
      # boot (`config/defines.inc.php`). Symfony's `!php/const` directive
      # reads the constant during container compilation, so shops with a
      # custom DB prefix get the correct table name — `ps_` is only the
      # default, not a guarantee. The `Installer::createSchema` migration
      # already uses `_DB_PREFIX_`; this keeps the writer consistent.
      $tablePrefix: !php/const _DB_PREFIX_
      $refBuilder: '@QameraAi\Module\Sync\ProductRefBuilder'
      $logger: '@QameraAi\Module\Sync\PrestaShopLoggerWrapper'

  QameraAi\Module\Sync\PrimaryImageResolver:
    public: true

  QameraAi\Module\Sync\InMemoryDedupCache:
    public: true

  # Vanilla Guzzle client used by `PresignedImageUploadStrategy` to PUT
  # image bytes to the presigned upload URL. Separate instance from the
  # one inside `QameraApiClient` so timeouts / headers can differ for
  # the raw upload (no auth, longer timeout, plain octet-stream body).
  qameraai.upload_http_client:
    class: GuzzleHttp\Client
    arguments:
      - { connect_timeout: 5.0, timeout: 60.0, http_errors: true }
    public: false

  QameraAi\Module\Sync\PresignedImageUploadStrategy:
    public: true
    arguments:
      $apiClient: '@QameraAi\Module\Api\QameraApiClient'
      $httpClient: '@qameraai.upload_http_client'

  QameraAi\Module\Sync\ImageUploadStrategy:
    alias: QameraAi\Module\Sync\PresignedImageUploadStrategy
    public: true

  QameraAi\Module\Sync\ProductImageSyncService:
    public: true
    arguments:
      $db: '@qameraai.db'
      $tablePrefix: !php/const _DB_PREFIX_
      $refBuilder: '@QameraAi\Module\Sync\ProductRefBuilder'
      $apiClient: '@QameraAi\Module\Api\QameraApiClient'
      $uploadStrategy: '@QameraAi\Module\Sync\PresignedImageUploadStrategy'
      $resolver: '@QameraAi\Module\Sync\PrimaryImageResolver'
      $logger: '@QameraAi\Module\Sync\PrestaShopLoggerWrapper'
      $dedupCache: '@QameraAi\Module\Sync\InMemoryDedupCache'

  # ---- Phase 4.1: webhook handler ----
  # The front controller (`controllers/front/webhook.php`) instantiates
  # the handler graph directly to keep storefront-request bootstrap cheap
  # and the legacy-dispatcher path framework-free. These service defs
  # exist so BO/admin code (Phase 4.2) can pull the same wiring via DI.

  QameraAi\Module\Webhook\SignatureHeaderParser:
    public: true

  QameraAi\Module\Webhook\HmacVerifier:
    public: true

  QameraAi\Module\Webhook\SystemClock:
    public: true

  QameraAi\Module\Webhook\Clock:
    alias: QameraAi\Module\Webhook\SystemClock
    public: true

  QameraAi\Module\Webhook\ReplayGuard:
    public: true
    arguments:
      $clock: '@QameraAi\Module\Webhook\SystemClock'

  QameraAi\Module\Webhook\WebhookDeliveryRepository:
    public: true
    arguments:
      $db: '@qameraai.db'
      $tablePrefix: !php/const _DB_PREFIX_

  QameraAi\Module\Webhook\Log\PrestaShopLoggerAdapter:
    public: true
    arguments:
      $logger: '@QameraAi\Module\Sync\PrestaShopLoggerWrapper'

  QameraAi\Module\Webhook\WebhookLogger:
    alias: QameraAi\Module\Webhook\Log\PrestaShopLoggerAdapter
    public: true

  QameraAi\Module\Webhook\WebhookRequestHandler:
    public: true
    arguments:
      $parser: '@QameraAi\Module\Webhook\SignatureHeaderParser'
      $verifier: '@QameraAi\Module\Webhook\HmacVerifier'
      $replayGuard: '@QameraAi\Module\Webhook\ReplayGuard'
      $repository: '@QameraAi\Module\Webhook\WebhookDeliveryRepository'
      $clock: '@QameraAi\Module\Webhook\SystemClock'
      $logger: '@QameraAi\Module\Webhook\Log\PrestaShopLoggerAdapter'
